<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Distância - Mapa Tático</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

#container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#map {
  position: absolute;
  top: 0;
  left: 0;
  transform-origin: top left;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  cursor: crosshair;
}

#loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #888;
  font-size: 14px;
  z-index: 100;
  pointer-events: none;
}

#info {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 10;
  background: rgba(0, 0, 0, 0.7);
  color: #aaa;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 12px;
  backdrop-filter: blur(4px);
}

#info span {
  color: #4ade80;
}
</style>
</head>

<body>

<div id="loading">Carregando mapa...</div>

<div id="info">
  Zoom: <span id="zoomLevel">100%</span> | Scroll para zoom
</div>

<div id="container">
  <img id="map" crossorigin="anonymous" fetchpriority="high" />
  <canvas id="canvas"></canvas>
</div>

<script>
/* ===============================
   CONFIGURAÇÃO
================================ */
const MAP_URL = 'https://i.postimg.cc/cs042L5Q/Rondo-Main-No-Text-High-Res-(1)-(1).png';
const IMAGE_SIZE = 8192;     // px reais do mapa
const METERS_PER_PIXEL = 1; // 1 px = 1 metro

/* ===============================
   ELEMENTOS
================================ */
const map = document.getElementById('map');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loadingEl = document.getElementById('loading');
const zoomLevelEl = document.getElementById('zoomLevel');

/* ===============================
   ESTADO
================================ */
let scale = 1;   // será ajustado automaticamente
let offsetX = 0;
let offsetY = 0;

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;

let pointA = null;
let pointB = null;

/* ===============================
   INICIALIZAÇÃO
================================ */
function init() {
  map.src = MAP_URL;

  map.onload = () => {
    loadingEl.style.display = 'none';
    fitMapToScreen();
    resize();
  };

  map.onerror = () => {
    loadingEl.textContent = 'Erro ao carregar o mapa.';
  };
}

/* ===============================
   ZOOM INICIAL (FIT TO SCREEN)
================================ */
function fitMapToScreen() {
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;

  const scaleX = screenW / IMAGE_SIZE;
  const scaleY = screenH / IMAGE_SIZE;

  scale = Math.min(scaleX, scaleY);

  offsetX = (screenW - IMAGE_SIZE * scale) / 2;
  offsetY = (screenH - IMAGE_SIZE * scale) / 2;

  zoomLevelEl.textContent = Math.round(scale * 100) + '%';
}

/* ===============================
   REDIMENSIONAMENTO
================================ */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redraw();
}

window.addEventListener('resize', resize);

/* ===============================
   ZOOM COM SCROLL
================================ */
window.addEventListener('wheel', (e) => {
  e.preventDefault();

  const zoomFactor = e.deltaY < 0 ? 1.15 : 0.87;
  const newScale = Math.max(0.1, Math.min(scale * zoomFactor, 10));

  const rect = canvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const worldX = (mouseX - offsetX) / scale;
  const worldY = (mouseY - offsetY) / scale;

  offsetX = mouseX - worldX * newScale;
  offsetY = mouseY - worldY * newScale;
  scale = newScale;

  zoomLevelEl.textContent = Math.round(scale * 100) + '%';
  redraw();
}, { passive: false });

/* ===============================
   PAN
================================ */
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 || e.button === 1) {
    isDragging = true;
    dragStartX = e.clientX - offsetX;
    dragStartY = e.clientY - offsetY;
  }
});

window.addEventListener('mousemove', (e) => {
  if (isDragging) {
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    redraw();
  }
});

window.addEventListener('mouseup', () => {
  isDragging = false;
});

/* ===============================
   CONVERSÃO DE COORDENADAS
================================ */
function screenToWorld(x, y) {
  return {
    x: (x - offsetX) / scale,
    y: (y - offsetY) / scale
  };
}

function worldToScreen(x, y) {
  return {
    x: x * scale + offsetX,
    y: y * scale + offsetY
  };
}

/* ===============================
   MEDIÇÃO
================================ */
canvas.addEventListener('click', (e) => {
  if (isDragging) return;

  const rect = canvas.getBoundingClientRect();
  const pos = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);

  if (pos.x < 0 || pos.x > IMAGE_SIZE || pos.y < 0 || pos.y > IMAGE_SIZE) return;

  if (!pointA && !pointB) {
    pointA = pos;
    redraw();
    return;
  }

  if (pointA && !pointB) {
    pointB = pos;
    redraw();
    return;
  }

  pointA = pos;
  pointB = null;
  redraw();
});

/* ===============================
   DISTÂNCIA (REAL)
================================ */
function calculateDistance() {
  if (!pointA || !pointB) return 0;

  const dx = pointB.x - pointA.x;
  const dy = pointB.y - pointA.y;

  return Math.round(Math.sqrt(dx * dx + dy * dy) * METERS_PER_PIXEL);
}

/* ===============================
   DESENHO
================================ */
function redraw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  map.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

  if (pointA && pointB) {
    const A = worldToScreen(pointA.x, pointA.y);
    const B = worldToScreen(pointB.x, pointB.y);
    const dist = calculateDistance();

    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(A.x, A.y);
    ctx.lineTo(B.x, B.y);
    ctx.stroke();

    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(A.x, A.y, 4, 0, Math.PI * 2);
    ctx.arc(B.x, B.y, 4, 0, Math.PI * 2);
    ctx.fill();

    const midX = (A.x + B.x) / 2;
    const midY = (A.y + B.y) / 2;

    ctx.font = 'bold 12px Segoe UI';
    const text = dist + 'm';
    const w = ctx.measureText(text).width;

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(midX - w / 2 - 6, midY - 10, w + 12, 20);

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, midX, midY);
  }

  if (pointA && !pointB) {
    const A = worldToScreen(pointA.x, pointA.y);
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(A.x, A.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ===============================
   START
================================ */
init();
</script>

</body>
</html>
